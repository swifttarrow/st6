services:
  postgres:
    image: postgres:16-alpine
    container_name: wct-postgres
    environment:
      POSTGRES_DB: wctdb
      POSTGRES_USER: wct
      POSTGRES_PASSWORD: wct
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wct -d wctdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
