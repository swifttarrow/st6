spring:
  datasource:
    url: jdbc:h2:mem:wctdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true

app:
  auth:
    claims:
      user-id: sub
      role: role
      team-id: team_id
      manager-id: manager_id
      direct-reports: direct_reports
  demo-host:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/wctdb
    driver-class-name: org.postgresql.Driver
    username: wct
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

---
spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER}
    password: ${PGPASSWORD}

server:
  port: ${PORT:${SERVER_PORT:8080}}

---
spring:
  config:
    activate:
      on-profile: docker
  web:
    resources:
      add-mappings: false

server:
  port: ${PORT:${SERVER_PORT:8080}}
